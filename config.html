<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dc-Security • Config</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root { --green: #22c55e; }
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
        
        .toggle-switch {
            width: 44px; height: 24px; background: #374151; border-radius: 9999px; 
            position: relative; cursor: pointer; transition: all 0.3s ease;
        }
        .toggle-switch.active { background: #22c55e; box-shadow: 0 0 12px rgba(34,197,94,0.4); }
        .toggle-knob { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; 
            background: white; border-radius: 50%; transition: transform 0.3s ease; }
        .toggle-switch.active .toggle-knob { transform: translateX(20px); }

        .card-hover { transition: all 0.3s ease; border: 1px solid #1e293b; }
        .card-hover:hover { border-color: #22c55e; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        .shield { filter: drop-shadow(0 0 30px rgba(34,197,94,0.5)); }
        
        .popup { 
            backdrop-filter: blur(20px); transform: scale(0.8); opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .popup.show { transform: scale(1); opacity: 1; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full bg-slate-950/95 backdrop-blur-xl z-50 border-b border-slate-800">
        <div class="max-w-4xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10">
                    <svg viewBox="0 0 120 120" class="w-full h-full">
                        <path d="M60 6 L108 27 V73 C108 100 83 117 60 117 C37 117 12 100 12 73 V27 L60 6Z" 
                              fill="#22c55e" stroke="#166534" stroke-width="4"/>
                        <path d="M35 61 L50 76 L85 42" stroke="white" stroke-width="10" 
                              stroke-linecap="round" fill="none"/>
                    </svg>
                </div>
                <span class="font-display text-2xl font-bold">Dc-Security</span>
            </div>
            <button id="generate-config" class="bg-gradient-to-r from-green-500 to-emerald-600 px-6 py-2.5 
                font-bold rounded-2xl hover:scale-105 transition-all shadow-lg hover:shadow-green-500/25">
                <i class="fas fa-magic mr-2"></i>Generate Config
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="pt-24 pb-12 max-w-4xl mx-auto px-6">
        <div class="text-center mb-16">
            <div class="w-24 h-24 shield mx-auto mb-8">
                <svg viewBox="0 0 120 120" class="w-full h-full">
                    <path d="M60 6 L108 27 V73 C108 100 83 117 60 117 C37 117 12 100 12 73 V27 L60 6Z" 
                          fill="#22c55e" stroke="#166534" stroke-width="5"/>
                    <path d="M35 61 L50 76 L85 42" stroke="white" stroke-width="11" 
                          stroke-linecap="round" fill="none"/>
                </svg>
            </div>
            <h1 class="font-display text-5xl md:text-6xl font-bold tracking-tight mb-6">Server Config</h1>
            <p class="text-xl text-slate-400 max-w-lg mx-auto">Toggle features on/off. Click Generate to get your JSON.</p>
        </div>

        <!-- Config Cards -->
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Raid Protection -->
            <div class="card-hover bg-slate-900 rounded-3xl p-8">
                <div class="w-16 h-16 bg-green-500/10 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                    <i class="fas fa-bomb text-2xl text-green-400"></i>
                </div>
                <h3 class="text-2xl font-bold text-center mb-6">Raid Protection</h3>
                <div class="flex items-center justify-center mb-4">
                    <div class="toggle-switch active" data-toggle="raid_protection">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="space-y-3 text-sm text-slate-400 text-center">
                    <label class="flex items-center justify-center gap-2 cursor-pointer">
                        <div class="toggle-switch" data-toggle="raid_mass_join"><div class="toggle-knob"></div></div>
                        Mass Join Block
                    </label>
                    <label class="flex items-center justify-center gap-2 cursor-pointer">
                        <div class="toggle-switch active" data-toggle="raid_new_accounts"><div class="toggle-knob"></div></div>
                        New Account Filter
                    </label>
                </div>
            </div>

            <!-- Verification -->
            <div class="card-hover bg-slate-900 rounded-3xl p-8">
                <div class="w-16 h-16 bg-green-500/10 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                    <i class="fas fa-user-shield text-2xl text-green-400"></i>
                </div>
                <h3 class="text-2xl font-bold text-center mb-6">Verification</h3>
                <div class="flex items-center justify-center mb-4">
                    <div class="toggle-switch active" data-toggle="verification">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="space-y-3 text-sm text-slate-400 text-center">
                    <label class="flex items-center justify-center gap-2 cursor-pointer">
                        <div class="toggle-switch active" data-toggle="captcha"><div class="toggle-knob"></div></div>
                        Reaction Captcha
                    </label>
                    <label class="flex items-center justify-center gap-2 cursor-pointer">
                        <div class="toggle-switch" data-toggle="phone"><div class="toggle-knob"></div></div>
                        Phone Required
                    </label>
                </div>
            </div>

            <!-- AutoMod -->
            <div class="card-hover bg-slate-900 rounded-3xl p-8">
                <div class="w-16 h-16 bg-green-500/10 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                    <i class="fas fa-brain text-2xl text-green-400"></i>
                </div>
                <h3 class="text-2xl font-bold text-center mb-6">AutoMod</h3>
                <div class="flex items-center justify-center mb-4">
                    <div class="toggle-switch active" data-toggle="automod">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="space-y-3 text-sm text-slate-400 text-center">
                    <label class="flex items-center justify-center gap-2 cursor-pointer">
                        <div class="toggle-switch active" data-toggle="phishing"><div class="toggle-knob"></div></div>
                        Phishing Links
                    </label>
                    <label class="flex items-center justify-center gap-2 cursor-pointer">
                        <div class="toggle-switch" data-toggle="spam"><div class="toggle-knob"></div></div>
                        Spam Filter
                    </label>
                </div>
            </div>

            <!-- Logging -->
            <div class="card-hover bg-slate-900 rounded-3xl p-8">
                <div class="w-16 h-16 bg-green-500/10 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                    <i class="fas fa-history text-2xl text-green-400"></i>
                </div>
                <h3 class="text-2xl font-bold text-center mb-6">Logging</h3>
                <div class="flex items-center justify-center mb-4">
                    <div class="toggle-switch active" data-toggle="logging">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="space-y-3 text-sm text-slate-400 text-center">
                    <label class="flex items-center justify-center gap-2 cursor-pointer">
                        <div class="toggle-switch active" data-toggle="mod_logs"><div class="toggle-knob"></div></div>
                        Mod Actions
                    </label>
                    <label class="flex items-center justify-center gap-2 cursor-pointer">
                        <div class="toggle-switch" data-toggle="join_logs"><div class="toggle-knob"></div></div>
                        Join/Leave
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Config Popup -->
    <div id="config-popup" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[9999] flex items-center justify-center p-6 hidden popup">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl max-w-4xl max-h-[80vh] w-full mx-4 p-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-display text-3xl font-bold flex items-center gap-3">
                    <i class="fas fa-file-code text-green-400"></i>Your Config
                </h2>
                <button id="close-popup" class="text-2xl hover:text-green-400 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="relative mb-6">
                <pre id="config-json" class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 
                    max-h-96 overflow-auto text-sm font-mono text-green-100 leading-relaxed"></pre>
                <div class="absolute top-3 right-3 bg-green-500/20 text-green-400 px-3 py-1 rounded-xl text-xs font-bold">
                    Ready to copy
                </div>
            </div>
            
            <div class="flex gap-4 pt-4">
                <button id="copy-config" class="flex-1 bg-gradient-to-r from-green-500 to-emerald-600 
                    py-4 px-6 font-bold rounded-2xl hover:scale-105 transition-all shadow-lg flex items-center 
                    justify-center gap-3 text-lg">
                    <i class="fas fa-copy"></i>Copy JSON
                </button>
                <button id="download-config" class="flex-1 bg-slate-800 border border-slate-700 py-4 px-6 
                    font-bold rounded-2xl hover:bg-slate-700 transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-download"></i>Download
                </button>
            </div>
        </div>
    </div>

    <script>
        class SimpleConfig {
            constructor() {
                this.settings = {
                    raid_protection: true, raid_mass_join: true, raid_new_accounts: true,
                    verification: true, captcha: true, phone: false,
                    automod: true, phishing: true, spam: false,
                    logging: true, mod_logs: true, join_logs: false
                };
                this.init();
            }

            init() {
                this.bindToggles();
                this.loadSettings();
            }

            bindToggles() {
                document.querySelectorAll('[data-toggle]').forEach(toggle => {
                    const key = toggle.dataset.toggle;
                    if (this.settings[key]) toggle.classList.add('active');
                    
                    toggle.addEventListener('click', () => {
                        toggle.classList.toggle('active');
                        this.settings[key] = toggle.classList.contains('active');
                        localStorage.setItem('dc_config', JSON.stringify(this.settings));
                    });
                });

                document.getElementById('generate-config').addEventListener('click', () => this.showPopup());
                document.getElementById('close-popup').addEventListener('click', () => this.hidePopup());
                document.getElementById('copy-config').addEventListener('click', () => this.copyConfig());
                document.getElementById('download-config').addEventListener('click', () => this.downloadConfig());
            }

            loadSettings() {
                const saved = localStorage.getItem('dc_config');
                if (saved) {
                    this.settings = { ...this.settings, ...JSON.parse(saved) };
                    document.querySelectorAll('[data-toggle]').forEach(toggle => {
                        const key = toggle.dataset.toggle;
                        if (this.settings[key]) toggle.classList.add('active');
                    });
                }
            }

            showPopup() {
                const json = JSON.stringify(this.settings, null, 2);
                document.getElementById('config-json').textContent = json;
                document.getElementById('config-popup').classList.remove('hidden', 'opacity-0');
                setTimeout(() => document.getElementById('config-popup').classList.add('show'), 10);
            }

            hidePopup() {
                document.getElementById('config-popup').classList.remove('show');
                setTimeout(() => document.getElementById('config-popup').classList.add('hidden'), 300);
            }

            copyConfig() {
                const json = JSON.stringify(this.settings, null, 2);
                navigator.clipboard.writeText(json).then(() => {
                    const btn = document.getElementById('copy-config');
                    const original = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check text-xl"></i>Copied!';
                    btn.classList.add('bg-green-600');
                    setTimeout(() => {
                        btn.innerHTML = original;
                        btn.classList.remove('bg-green-600');
                    }, 1500);
                });
            }

            downloadConfig() {
                const json = JSON.stringify(this.settings, null, 2);
                const dataStr = `data:text/json;charset=utf-8,${encodeURIComponent(json)}`;
                const link = document.createElement('a');
                link.setAttribute('href', dataStr);
                link.setAttribute('download', `dc-security-config.json`);
                link.click();
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            new SimpleConfig();
        });
    </script>
</body>
</html>
