<script>
class DcSecurityConfig {

    constructor() {

        this.settings = {

            // CORE
            anti_raid: false,
            anti_nuke: false,
            smart_automod: false,
            scam_protection: false,
            verification: false,
            detailed_logs: false,
            dashboard: false,
            backup_restore: false,
            appeals: false,
            analytics: false,
            premium_level: false,
            ai_detection: false,
            threat_intelligence: false,
            risk_scoring: false,
            cross_server_protection: false,
            real_time_alerts: false,
            behavioral_analysis: false,

            // RAID
            raid_protection: false,
            raid_mass_join: false,
            raid_join_threshold: 5,
            raid_new_accounts: false,
            raid_account_age_days: 7,
            raid_suspicious_ips: false,
            raid_vpn_action: "warn",

            // VERIFICATION
            verification_system: false,
            verification_captcha: false,
            verification_account_age: false,
            verification_account_age_days: 14,
            verification_phone: false,

            // AUTOMOD
            automod_enabled: false,
            automod_phishing: false,
            automod_toxicity: false,
            automod_toxicity_threshold: 75,
            automod_spam: false,
            automod_spam_messages: 5,

            // LOGGING
            logging_enabled: false,
            log_moderation: false,
            log_joins: false,
            log_webhook: false,
            logging_webhook: ""
        };

        this.init();
    }

    init() {

        this.bindToggles();

        this.bindInputs();

        this.loadSettings();

        this.updateInputs();
    }

    // ----------------------------------------
    // TOGGLES
    // ----------------------------------------
    bindToggles() {

        document.querySelectorAll("[data-toggle]").forEach(toggle => {

            const key = toggle.dataset.toggle;

            toggle.classList.remove("active");

            toggle.addEventListener("click", () => {

                toggle.classList.toggle("active");

                this.settings[key] = toggle.classList.contains("active");

                this.save();
            });
        });
    }

    // ----------------------------------------
    // INPUTS
    // ----------------------------------------
    bindInputs() {

        document.querySelectorAll("[data-input]").forEach(input => {

            const key = input.dataset.input;

            input.addEventListener("input", () => {

                let value = input.value;

                // NUMBER
                if (input.type === "number") {

                    value = Number(value);
                }

                this.settings[key] = value;

                this.save();
            });
        });

        document.querySelectorAll("[data-select]").forEach(select => {

            const key = select.dataset.select;

            select.addEventListener("change", () => {

                this.settings[key] = select.value;

                this.save();
            });
        });

        // BUTTONS
        document
            .getElementById("generate-config")
            .addEventListener("click", () => this.showPopup());

        document
            .getElementById("close-popup")
            .addEventListener("click", () => this.hidePopup());

        document
            .getElementById("copy-config")
            .addEventListener("click", () => this.copyConfig());

        document
            .getElementById("download-config")
            .addEventListener("click", () => this.downloadConfig());
    }

    // ----------------------------------------
    // UPDATE INPUTS
    // ----------------------------------------
    updateInputs() {

        // TOGGLES
        document.querySelectorAll("[data-toggle]").forEach(toggle => {

            const key = toggle.dataset.toggle;

            if (this.settings[key] === true) {

                toggle.classList.add("active");

            } else {

                toggle.classList.remove("active");
            }
        });

        // INPUTS
        document.querySelectorAll("[data-input]").forEach(input => {

            const key = input.dataset.input;

            input.value = this.settings[key];
        });

        // SELECTS
        document.querySelectorAll("[data-select]").forEach(select => {

            const key = select.dataset.select;

            select.value = this.settings[key];
        });
    }

    // ----------------------------------------
    // SAVE
    // ----------------------------------------
    save() {

        localStorage.setItem(

            "dc_security_config",

            JSON.stringify(this.settings)
        );
    }

    // ----------------------------------------
    // LOAD
    // ----------------------------------------
    loadSettings() {

        const saved = localStorage.getItem(
            "dc_security_config"
        );

        if (!saved)
            return;

        try {

            const parsed = JSON.parse(saved);

            this.settings = {

                ...this.settings,

                ...parsed
            };

        } catch {}
    }

    // ----------------------------------------
    // POPUP
    // ----------------------------------------
    showPopup() {

        const json = JSON.stringify(

            this.settings,

            null,

            2
        );

        document.getElementById(
            "config-json"
        ).textContent = json;

        document
            .getElementById("config-popup")
            .classList.remove("hidden");

        setTimeout(() => {

            document
                .getElementById("config-popup")
                .classList.add("show");

        }, 10);
    }

    hidePopup() {

        document
            .getElementById("config-popup")
            .classList.remove("show");

        setTimeout(() => {

            document
                .getElementById("config-popup")
                .classList.add("hidden");

        }, 300);
    }

    // ----------------------------------------
    // COPY
    // ----------------------------------------
    copyConfig() {

        const json = JSON.stringify(

            this.settings,

            null,

            2
        );

        navigator.clipboard.writeText(json);

        const btn = document.getElementById(
            "copy-config"
        );

        const original = btn.innerHTML;

        btn.innerHTML =
            '<i class="fas fa-check"></i> Copied';

        setTimeout(() => {

            btn.innerHTML = original;

        }, 1500);
    }

    // ----------------------------------------
    // DOWNLOAD
    // ----------------------------------------
    downloadConfig() {

        const json = JSON.stringify(

            this.settings,

            null,

            2
        );

        const blob = new Blob(

            [json],

            {
                type: "application/json"
            }
        );

        const url = URL.createObjectURL(
            blob
        );

        const a = document.createElement(
            "a"
        );

        a.href = url;

        a.download =
            "dc-security-config.json";

        a.click();

        URL.revokeObjectURL(url);
    }
}

// INIT
document.addEventListener(

    "DOMContentLoaded",

    () => {

        new DcSecurityConfig();
    }
);
</script>
