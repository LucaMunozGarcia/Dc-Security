<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dc-Security • Config Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg0: #1e1f22;
  --bg1: #232428;
  --bg2: #2b2d31;
  --bg3: #313338;
  --bg4: #383a40;
  --border: rgba(255,255,255,.07);
  --accent: #5865f2;
  --accent-glow: rgba(88,101,242,.25);
  --text: #f2f3f5;
  --muted: #b5bac1;
  --r: 18px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg0);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

.hero-orb,
.fab-pulse{
  pointer-events:none;
}

button,
.toggle,
.pill,
.slider{
  pointer-events:auto;
  position:relative;
  z-index:5;
}

.slider{
  appearance:none;
  -webkit-appearance:none;
  position:relative;
  z-index:2;
}

.slider::-webkit-slider-thumb{
  appearance:none;
  -webkit-appearance:none;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#5865f2;
  cursor:pointer;
  position:relative;
  z-index:3;
}

nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  backdrop-filter:blur(18px);
  background:rgba(30,31,34,.88);
  border-bottom:1px solid rgba(255,255,255,.06);
}

.nav-inner{
  max-width:1200px;
  margin:auto;
  height:72px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
}

.logo{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-icon{
  width:46px;
  height:46px;
  border-radius:14px;
  background:#2b2d31;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
}

.logo-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.logo-text{
  font-size:21px;
  font-weight:700;
}

.btn-gen{
  border:none;
  background:#5865f2;
  color:white;
  padding:12px 20px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.btn-gen:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px var(--accent-glow);
}

.hero{
  padding:150px 24px 70px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.hero h1{
  font-size:72px;
  line-height:1;
  letter-spacing:-2px;
  margin-bottom:18px;
}

.hero span{
  background:linear-gradient(135deg,#5865f2,#00b0f4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  max-width:700px;
  margin:auto;
  color:var(--muted);
  font-size:18px;
  line-height:1.6;
}

.hero-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(100px);
  opacity:.25;
}

.hero-orb1{
  width:500px;
  height:500px;
  background:#5865f2;
  top:-200px;
  left:50%;
  transform:translateX(-50%);
}

.main{
  max-width:1200px;
  margin:auto;
  padding:0 24px 100px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:18px;
}

.card{
  background:#2b2d31;
  border:1px solid rgba(255,255,255,.07);
  border-radius:24px;
  padding:22px;
  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
  border-color:rgba(88,101,242,.4);
}

.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.card-title{
  font-size:16px;
  font-weight:700;
}

.card-desc{
  color:var(--muted);
  margin-top:4px;
  font-size:14px;
}

.toggle{
  width:54px;
  height:30px;
  border-radius:999px;
  border:none;
  background:#3a3c42;
  cursor:pointer;
  transition:.2s;
}

.toggle.on{
  background:#5865f2;
  box-shadow:0 0 18px rgba(88,101,242,.4);
}

.section{
  margin-bottom:28px;
}

.section-title{
  font-size:28px;
  margin-bottom:18px;
  font-weight:700;
}

.slider{
  width:100%;
  height:5px;
  border-radius:999px;
  background:#3a3c42;
}

.popup-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup-overlay.open{
  display:flex;
}

.popup{
  width:90%;
  max-width:800px;
  background:#232428;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.08);
  overflow:hidden;
}

.popup-head{
  padding:24px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.popup-body{
  padding:24px;
}

pre{
  background:#1e1f22;
  padding:18px;
  border-radius:16px;
  overflow:auto;
}

.popup-foot{
  padding:20px;
  display:flex;
  gap:12px;
}

.btn-copy,
.btn-dl{
  flex:1;
  border:none;
  padding:12px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

.btn-copy{
  background:#5865f2;
  color:white;
}

.btn-dl{
  background:#313338;
  color:white;
}

.fab{
  position:fixed;
  right:30px;
  bottom:30px;
  border:none;
  background:#5865f2;
  color:white;
  padding:16px 22px;
  border-radius:18px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(88,101,242,.35);
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo">
      <div class="logo-icon">
        <img src="https://i.ibb.co/9wK4M7v/shield.png" alt="shield">
      </div>
      <div class="logo-text">Dc-Security</div>
    </div>

    <button class="btn-gen" onclick="generate()">
      Generate Config
    </button>
  </div>
</nav>

<div class="hero">
  <div class="hero-orb hero-orb1"></div>

  <h1>
    Configure <span>Dc-Security</span>
  </h1>

  <p>
    Professional Discord security configuration panel with live JSON generation.
  </p>
</div>

<div class="main">

  <div class="section">
    <div class="section-title">Core Systems</div>

    <div class="grid">

      <div class="card">
        <div class="row">
          <div>
            <div class="card-title">Anti Raid</div>
            <div class="card-desc">Blocks coordinated join attacks</div>
          </div>

          <button class="toggle" data-key="anti_raid" onclick="toggleKey(this)"></button>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <div class="card-title">Anti Nuke</div>
            <div class="card-desc">Prevents mass deletion attacks</div>
          </div>

          <button class="toggle" data-key="anti_nuke" onclick="toggleKey(this)"></button>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <div class="card-title">Smart AutoMod</div>
            <div class="card-desc">AI based moderation engine</div>
          </div>

          <button class="toggle" data-key="smart_automod" onclick="toggleKey(this)"></button>
        </div>
      </div>

      <div class="card">
        <div class="card-title" style="margin-bottom:16px">Toxicity Threshold</div>

        <input
          type="range"
          min="1"
          max="100"
          value="75"
          class="slider"
          id="toxicity"
        >
      </div>

    </div>
  </div>

</div>

<button class="fab" onclick="generate()">
  Generate Config
</button>

<div class="popup-overlay" id="popup">
  <div class="popup">

    <div class="popup-head">
      <h2>Generated JSON</h2>

      <button onclick="closePopup()">✕</button>
    </div>

    <div class="popup-body">
      <pre id="json-out"></pre>
    </div>

    <div class="popup-foot">
      <button class="btn-copy" onclick="copyJSON()">Copy JSON</button>
      <button class="btn-dl" onclick="downloadJSON()">Download</button>
    </div>

  </div>
</div>

<script>
function toggleKey(el){
  el.classList.toggle('on');
}

function buildConfig(){
  const cfg = {};

  document.querySelectorAll('.toggle[data-key]').forEach(toggle => {
    cfg[toggle.dataset.key] = toggle.classList.contains('on');
  });

  cfg.toxicity_threshold = Number(document.getElementById('toxicity').value);

  return cfg;
}

function generate(){
  document.getElementById('popup').classList.add('open');
  document.getElementById('json-out').textContent = JSON.stringify(buildConfig(), null, 2);
}

function closePopup(){
  document.getElementById('popup').classList.remove('open');
}

function copyJSON(){
  navigator.clipboard.writeText(
    document.getElementById('json-out').textContent
  );
}

function downloadJSON(){
  const blob = new Blob([
    document.getElementById('json-out').textContent
  ], {
    type:'application/json'
  });

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dc-security-config.json';
  a.click();
}
</script>

</body>
</html>
